<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img class="avatar" src="icons/avatar.png" alt="TVABDOU" />
      <div class="brand-txt">
        <strong>TVABDOU</strong>
        <span id="statusPill" class="pill off">HORS LIGNE</span>
      </div>
    </div>
    <button id="notifToggle" class="notif-btn" title="Activer / couper les notifications">
      <span class="notif-icon">🔔</span>
      <span id="notifState">ON</span>
    </button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="live">Live / VOD</button>
    <button class="tab" data-tab="planning">Planning</button>
    <button class="tab" data-tab="videos">Vidéos</button>
  </nav>

  <main>
    <section id="tab-live" class="panel active">
      <div id="liveContent" class="loading">Chargement…</div>
      <div class="socials" id="socials"></div>
    </section>

    <section id="tab-planning" class="panel">
      <div class="planning-bar">
        <span>📅 Planning</span>
        <a id="planningOpen" href="#" target="_blank">Ouvrir en grand ↗</a>
      </div>
      <div id="planningWrap" class="planning-wrap"></div>
    </section>

    <section id="tab-videos" class="panel">
      <div id="videosContent" class="loading">Chargement…</div>
    </section>
  </main>

  <footer>
    <a href="https://twitch.tv/tvabdou" target="_blank">twitch.tv/tvabdou</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
