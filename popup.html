<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img class="avatar" src="icons/avatar.png" alt="TVABDOU" />
      <div class="brand-txt">
        <strong>TVABDOU</strong>
        <span id="statusPill" class="pill off">HORS LIGNE</span>
      </div>
    </div>
    <button id="notifToggle" class="notif-btn" title="Activer / couper les notifications">
      <span class="notif-icon">🔔</span>
      <span id="notifState">ON</span>
    </button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="live" title="Live / VOD" aria-label="Live / VOD">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 9.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5zM6.34 5.34a1 1 0 011.41 1.41 6 6 0 000 8.49 1 1 0 11-1.41 1.41 8 8 0 010-11.31zm11.32 0a8 8 0 010 11.31 1 1 0 11-1.41-1.41 6 6 0 000-8.49 1 1 0 011.41-1.41zM3.51 2.51a1 1 0 011.42 1.42 10 10 0 000 14.14 1 1 0 11-1.42 1.42 12 12 0 010-16.98zm16.98 0a12 12 0 010 16.98 1 1 0 11-1.42-1.42 10 10 0 000-14.14 1 1 0 011.42-1.42z"/></svg>
    </button>
    <button class="tab" data-tab="planning" title="Planning" aria-label="Planning">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 2a1 1 0 00-1 1v1H5a2 2 0 00-2 2v13a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H8V3a1 1 0 00-1-1zm12 7v10H5V9h14z"/></svg>
    </button>
    <button class="tab" data-tab="videos" title="Vidéos" aria-label="Vidéos">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 4.5A2.5 2.5 0 001.5 7v10A2.5 2.5 0 004 19.5h16a2.5 2.5 0 002.5-2.5V7A2.5 2.5 0 0020 4.5H4zm5.75 3.9l5.5 3.1-5.5 3.1V8.4z"/></svg>
    </button>
    <button class="tab" data-tab="patreon" title="Patreon" aria-label="Patreon">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M14.82 2.41c3.96 0 7.18 3.24 7.18 7.21 0 3.96-3.22 7.18-7.18 7.18-3.97 0-7.21-3.22-7.21-7.18 0-3.97 3.24-7.21 7.21-7.21M2 21.6h3.5V2.41H2V21.6z"/></svg>
    </button>
  </nav>

  <main>
    <section id="tab-live" class="panel active scroll">
      <div id="liveContent" class="loading">Chargement…</div>
    </section>

    <section id="tab-planning" class="panel fill">
      <div class="frame-bar">
        <span>📅 Planning</span>
        <a id="planningOpen" href="#" target="_blank">Ouvrir en grand ↗</a>
      </div>
      <div id="planningWrap" class="frame-wrap"></div>
    </section>

    <section id="tab-videos" class="panel scroll">
      <div id="videosContent" class="loading">Chargement…</div>
    </section>

    <section id="tab-patreon" class="panel scroll">
      <div class="frame-bar">
        <span>Patreon — 3 dernières publications</span>
        <a id="patreonOpen" href="#" target="_blank">Ouvrir ↗</a>
      </div>
      <div id="patreonContent" class="loading">Chargement…</div>
    </section>
  </main>

  <div class="social-bar" id="socials"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
